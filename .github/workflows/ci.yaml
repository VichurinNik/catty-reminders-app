name: CI

on:
  push:
    branches: [ lab4* ]
  pull_request:
    branches: [ lab4* ]

jobs:
  docker-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        continue-on-error: true
        with:
          dockerfile: Dockerfile

  tests:
    needs: docker-lint
    runs-on: ubuntu-latest
    services:
      db:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: mypass
          MYSQL_DATABASE: catty_reminders
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt pytest-playwright
          playwright install --with-deps chromium
      - name: Check app import
        run: |
          python -c "from app.main import app; print('App imported successfully')"
      - name: Patch config for CI
        run: |
          sed -i 's/"host": "db"/"host": "127.0.0.1"/g' config.json
      - name: Initialize database
        run: |
          mysql -h 127.0.0.1 -u root -pmypass -e "CREATE DATABASE IF NOT EXISTS catty_reminders;"
          mysql -h 127.0.0.1 -u root -pmypass catty_reminders << 'EOF'
          CREATE TABLE IF NOT EXISTS reminder_lists (
            id INT AUTO_INCREMENT PRIMARY KEY,
            owner VARCHAR(255) NOT NULL,
            name VARCHAR(255) NOT NULL
          );
          CREATE TABLE IF NOT EXISTS reminder_items (
            id INT AUTO_INCREMENT PRIMARY KEY,
            list_id INT NOT NULL,
            description TEXT NOT NULL,
            completed BOOLEAN DEFAULT FALSE,
            FOREIGN KEY (list_id) REFERENCES reminder_lists(id) ON DELETE CASCADE
          );
          CREATE TABLE IF NOT EXISTS selected_lists (
            owner VARCHAR(255) PRIMARY KEY,
            list_id INT,
            FOREIGN KEY (list_id) REFERENCES reminder_lists(id) ON DELETE SET NULL
          );
          EOF
      - name: Start app
        run: |
          uvicorn app.main:app --host 127.0.0.1 --port 8181 &
          sleep 15
      - name: Run tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: pytest --junitxml=test_result.xml
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test_result
          path: test_result.xml

  build-and-push:
    needs: tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Prepare image name
        id: prep
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "repo_lower=${REPO_LOWER}" >> $GITHUB_OUTPUT
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: |
            DEPLOY_REF=${{ github.sha }}
          tags: |
            ghcr.io/${{ steps.prep.outputs.repo_lower }}:latest
            ghcr.io/${{ steps.prep.outputs.repo_lower }}:${{ github.sha }}
