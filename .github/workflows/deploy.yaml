name: CD

on:
  release:
    types:
      - published

permissions:
  contents: read
  packages: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run unit tests
        run: python -m pytest -v tests/test_unit.py

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: course.prafdin.ru
          port: 3106
          username: vboxuser
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/vboxuser/lab4/catty-reminders-app
            git fetch origin
            git reset --hard origin/lab4

            export IMAGE="ghcr.io/vichurinnik/catty-reminders-app:${{ github.sha }}"
            export DEPLOY_REF="${{ github.sha }}"

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            docker compose down 2>/dev/null || true
            docker compose up -d --pull always --remove-orphans --force-recreate

            docker image prune -f
