name: Deploy

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare Image Name
        id: prep
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "repo_lower=${REPO_LOWER}" >> $GITHUB_OUTPUT
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: course.prafdin.ru
          username: vboxuser
          port: 3106
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            bash -c '
              set -e
              cd /home/vboxuser/lab4/catty-reminders-app || mkdir -p /home/vboxuser/lab4/catty-reminders-app && cd /home/vboxuser/lab4/catty-reminders-app
              OWNER=$(echo "${{ github.repository_owner }}" | tr "[:upper:]" "[:lower:]")
              
              export DEPLOY_REF=${{ github.sha }}
              export IMAGE=ghcr.io/$OWNER/catty-reminders-app:${{ github.sha }}
              
              export APP_CONTAINER_NAME=catty-app
              export MARIADB_ROOT_PASSWORD=mypass
              export MARIADB_USER=vboxuser
              export MARIADB_PASSWORD=mypass
              export MARIADB_DATABASE=catty_reminders
              export HOST_APP_PORT=8181
              export CONTEINER_APP_PORT=8181
              export HOST_DB_PORT=3306
              export CONTEINER_DB_PORT=3306

              echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
              docker compose up -d --pull always --remove-orphans --force-recreate
              
              echo "=== Waiting for containers to start ==="
              sleep 10
              
              echo "=== Container status ==="
              docker ps -a
              
              echo "=== App logs ==="
              docker compose logs catty-app --tail 50
              
              echo "=== DB logs ==="
              docker compose logs db --tail 20
              
              echo "=== Testing locally ==="
              curl -s http://localhost:8181/login | head -20 || echo "App not responding"
            '
