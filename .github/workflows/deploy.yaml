name: CD

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: course.prafdin.ru
          username: vboxuser
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 3106
          script: |
            cd /home/vboxuser/lab4/catty-reminders-app
            git fetch origin
            git reset --hard origin/lab4

            export APP_IMAGE=ghcr.io/vichurinnik/catty-reminders-app:latest
            export MYSQL_ROOT_PASSWORD=mypass
            export MYSQL_DATABASE=catty_reminders

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            docker compose down
            docker compose up -d --pull always --remove-orphans --force-recreate

            docker image prune -f

            echo "DEPLOY_REF=${{ github.sha }}" > /home/vboxuser/lab4/catty-reminders-app/.env
            docker exec catty-app sh -c 'echo "DEPLOY_REF=${{ github.sha }}" >> /app/.env'
            docker restart catty-app
